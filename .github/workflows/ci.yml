name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.version.outputs.version_changed }}
      old_version: ${{ steps.version.outputs.old_version }}
      new_version: ${{ steps.version.outputs.new_version }}

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Detect version change
        id: version
        shell: bash
        run: |
          old_version=""
          new_version="$(
            sed -nE 's/^[[:space:]]*version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' build.gradle.kts | head -n 1
          )"
          version_changed=false

          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            before_sha="${{ github.event.before }}"

            if [ "$before_sha" != "0000000000000000000000000000000000000000" ]; then
              old_version="$(
                git show "${before_sha}:build.gradle.kts" 2>/dev/null |
                  sed -nE 's/^[[:space:]]*version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' | head -n 1
              )"
            fi

            if [ -n "$new_version" ] && [ "$old_version" != "$new_version" ]; then
              version_changed=true
            fi
          fi

          echo "old_version=$old_version" >> "$GITHUB_OUTPUT"
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"
          echo "version_changed=$version_changed" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: ./gradlew test

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out merged commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Build plugin archive
        run: ./gradlew buildPlugin verifyPlugin

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: jetbrains-recorder-plugin-zip
          path: build/distributions/*.zip

  publish:
    name: Publish to JetBrains Marketplace
    needs: [test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.test.outputs.version_changed == 'true' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    env:
      JETBRAINS_MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
      JETBRAINS_PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
      JETBRAINS_PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
      JETBRAINS_CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}

    steps:
      - name: Check out merged commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Publish plugin
        run: ./gradlew verifyPlugin publishPlugin

  notify:
    name: Post Discord publish note
    needs: [test, publish]
    if: needs.publish.result == 'success'
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      COMMIT_SHA: ${{ github.sha }}
      COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
      REPO: ${{ github.repository }}
      OLD_VERSION: ${{ needs.test.outputs.old_version }}
      NEW_VERSION: ${{ needs.test.outputs.new_version }}

    steps:
      - name: Check out merged commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Build Discord payload
        run: |
          test -n "$DISCORD_WEBHOOK_URL"
          python3 <<'PY' > discord-payload.json
          import json
          import os
          import re
          from pathlib import Path

          build_gradle = Path("build.gradle.kts").read_text(encoding="utf-8")
          match = re.search(r'^\s*name\s*=\s*"([^"]+)"', build_gradle, re.MULTILINE)
          plugin_name = match.group(1) if match else Path.cwd().name
          old_version = os.environ.get("OLD_VERSION") or "unknown"
          new_version = os.environ.get("NEW_VERSION") or old_version
          short_sha = os.environ["COMMIT_SHA"][:7]
          content = (
              f"{plugin_name} {new_version} was published to JetBrains Marketplace.\n"
              f"{os.environ['COMMIT_URL']}\n\n"
              f"Version: `{old_version or 'none'}` -> `{new_version}`\n"
              f"Commit: `{short_sha}` in `{os.environ['REPO']}`"
          )
          print(json.dumps({"content": content}))
          PY

      - name: Post to Discord
        run: |
          curl -sS -X POST \
            -H "Content-Type: application/json" \
            --data @discord-payload.json \
            "$DISCORD_WEBHOOK_URL"
